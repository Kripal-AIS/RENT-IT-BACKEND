name: Node.js CI/CD

on:
  push:
    branches: [ "PRODUCTION" ]
  pull_request:
    branches: [ "PRODUCTION" ]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]
        # You can remove 22.x if you're not ready for it

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Set up environment file
        run: |
          touch .env
          echo "${{ secrets.PRODUCTION_ENV_FILE }}" > .env

      - name: Install dependencies
        run: npm install

      - name: Ensure PM2 is installed globally
        run: npm install -g pm2

      - name: Restart app using PM2
        run: |
          pm2 delete index || true
          pm2 start index.js --name index
          pm2 save
